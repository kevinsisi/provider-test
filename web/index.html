<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; flex-shrink: 0; }

    #model-select {
      flex: 1;
      min-width: 160px;
      max-width: 320px;
      padding: 5px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }
    #model-select:focus { outline: none; border-color: #1a73e8; }

    .header-btn {
      font-size: 13px;
      padding: 5px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-btn:hover { background: #f5f5f5; }
    .header-btn.active { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    .header-btn.success { background: #e6f4ea; border-color: #34a853; color: #188038; }

    /* ── auth panel ── */
    #auth-panel {
      display: none;
      background: #fffde7;
      border-bottom: 1px solid #f9e400;
      padding: 12px 16px;
      font-size: 13px;
      gap: 10px;
      align-items: flex-start;
      flex-direction: column;
    }
    #auth-panel.open { display: flex; }

    #auth-panel .auth-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #auth-panel select {
      padding: 4px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 13px;
    }

    #auth-panel button {
      padding: 5px 12px;
      border: 1px solid #1a73e8;
      border-radius: 5px;
      background: #1a73e8;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
    }
    #auth-panel button:hover { background: #1558b0; }
    #auth-panel button:disabled { background: #aaa; border-color: #aaa; cursor: not-allowed; }

    #auth-status {
      color: #555;
      font-size: 12px;
    }
    #auth-status.waiting { color: #e65100; }
    #auth-status.done { color: #188038; font-weight: 600; }
    #auth-status.error { color: #d32f2f; }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-role {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .msg-image {
      max-width: 280px;
      max-height: 200px;
      border-radius: 8px;
      margin-bottom: 6px;
      object-fit: contain;
    }
    .msg.user .msg-image { border: 2px solid #1a73e8; }

    .msg-model-tag {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #aaa;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── input ── */
    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    #image-preview-area {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .preview-item { position: relative; }
    .preview-item img {
      width: 60px; height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
    .preview-item button {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #666; color: #fff; border: none; cursor: pointer;
      font-size: 11px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }

    #input-row { display: flex; gap: 8px; align-items: flex-end; }

    #image-btn {
      flex-shrink: 0; width: 38px; height: 38px;
      border: 1px solid #d0d0d0; border-radius: 8px;
      background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #555; font-size: 18px;
    }
    #image-btn:hover { background: #f5f5f5; }

    #text-input {
      flex: 1; padding: 9px 12px;
      border: 1px solid #d0d0d0; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      resize: none; outline: none; max-height: 120px; line-height: 1.4;
    }
    #text-input:focus { border-color: #1a73e8; }

    #send-btn {
      flex-shrink: 0; width: 38px; height: 38px;
      border: none; border-radius: 8px;
      background: #1a73e8; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #send-btn:hover { background: #1558b0; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #file-input { display: none; }

    .error-msg {
      color: #d32f2f; font-size: 12px;
      padding: 6px 10px; background: #fce4e4; border-radius: 6px;
      align-self: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>OpenCode Chat</h1>
    <select id="model-select"><option value="">載入中...</option></select>
    <button id="auth-toggle-btn" class="header-btn">🔑 Connect</button>
    <button id="new-btn" class="header-btn">New Chat</button>
  </header>

  <div id="auth-panel">
    <div class="auth-row">
      <label style="font-weight:600">Provider</label>
      <select id="auth-provider-select">
        <option value="openai" data-method="0">OpenAI (ChatGPT Pro/Plus - browser)</option>
        <option value="openai" data-method="1">OpenAI (ChatGPT Pro/Plus - headless)</option>
        <option value="github-copilot" data-method="0">GitHub Copilot</option>
      </select>
      <button id="auth-start-btn">開始驗證</button>
    </div>
    <div id="auth-status"></div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <div id="image-preview-area"></div>
    <div id="input-row">
      <button id="image-btn" title="Attach image">🖼</button>
      <textarea id="text-input" placeholder="輸入訊息..." rows="1"></textarea>
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M1 1l14 7-14 7V9l10-1L1 7V1z"/>
        </svg>
      </button>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" multiple>

  <script>
    const API = 'http://localhost:4096'
    const DEFAULT_MODEL = { providerID: 'opencode', modelID: 'deepseek-v4-flash-free' }

    let sessionId = null
    let pendingImages = []
    let busy = false

    const messagesEl = document.getElementById('messages')
    const modelSelect = document.getElementById('model-select')
    const authToggleBtn = document.getElementById('auth-toggle-btn')
    const authPanel = document.getElementById('auth-panel')
    const authProviderSelect = document.getElementById('auth-provider-select')
    const authStartBtn = document.getElementById('auth-start-btn')
    const authStatus = document.getElementById('auth-status')
    const textInput = document.getElementById('text-input')
    const sendBtn = document.getElementById('send-btn')
    const imageBtn = document.getElementById('image-btn')
    const fileInput = document.getElementById('file-input')
    const previewArea = document.getElementById('image-preview-area')
    const newBtn = document.getElementById('new-btn')

    // ── model ─────────────────────────────────────────────────

    function selectedModel() {
      const val = modelSelect.value
      if (!val) return DEFAULT_MODEL
      const [providerID, ...rest] = val.split('/')
      return { providerID, modelID: rest.join('/') }
    }

    async function loadModels() {
      try {
        const res = await fetch(`${API}/provider`)
        const data = await res.json()

        // Focus on opencode (always free) + any provider user has authed
        const SHOW_PROVIDERS = ['opencode', 'openai', 'github-copilot', 'google', 'anthropic']
        const authRes = await fetch(`${API}/provider/auth`)
        const authData = await authRes.json()
        const authProviders = new Set(Object.keys(authData))

        modelSelect.innerHTML = ''
        let defaultSet = false

        for (const provider of data.all) {
          if (!SHOW_PROVIDERS.includes(provider.id)) continue
          const modelEntries = Object.values(provider.models || {})
          if (modelEntries.length === 0) continue

          // For providers that need auth (in authData), only show if they have
          // models that are accessible (we'll show them but they may fail at runtime)
          const needsAuth = authProviders.has(provider.id)

          const group = document.createElement('optgroup')
          group.label = provider.name + (needsAuth ? ' 🔒' : ' ✓')

          for (const model of modelEntries) {
            const opt = document.createElement('option')
            opt.value = `${provider.id}/${model.id}`
            const cost = model.cost?.input === 0 ? ' (free)' : ''
            opt.textContent = (model.name || model.id) + cost
            if (!needsAuth && !defaultSet) {
              opt.selected = true
              defaultSet = true
            }
            group.appendChild(opt)
          }
          modelSelect.appendChild(group)
        }
      } catch (e) {
        modelSelect.innerHTML = '<option value="">載入失敗</option>'
        console.error('loadModels failed', e)
      }
    }

    // ── oauth ─────────────────────────────────────────────────

    authToggleBtn.addEventListener('click', () => {
      const open = authPanel.classList.toggle('open')
      authToggleBtn.classList.toggle('active', open)
    })

    authStartBtn.addEventListener('click', startAuth)

    async function startAuth() {
      const opt = authProviderSelect.selectedOptions[0]
      const providerID = opt.value
      const methodIndex = parseInt(opt.dataset.method, 10)

      authStartBtn.disabled = true
      authStatus.className = 'waiting'
      authStatus.textContent = '正在取得驗證 URL...'

      try {
        const res = await fetch(`${API}/provider/${providerID}/oauth/authorize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method: methodIndex }),
        })

        if (!res.ok) {
          const err = await res.text()
          throw new Error(`${res.status}: ${err}`)
        }

        const auth = await res.json()

        if (!auth || !auth.url) {
          authStatus.textContent = '此方法不需要跳轉，驗證已自動完成。'
          authStatus.className = 'done'
          await loadModels()
          authStartBtn.disabled = false
          return
        }

        authStatus.className = 'waiting'
        authStatus.innerHTML = `
          已在新分頁開啟驗證頁面，請完成登入後點「完成驗證」。<br>
          <small style="color:#777">${auth.instructions || ''}</small><br><br>
          <button id="auth-done-btn" style="padding:5px 14px;border:1px solid #34a853;border-radius:5px;background:#34a853;color:#fff;font-size:13px;cursor:pointer">✓ 完成驗證</button>
        `
        window.open(auth.url, '_blank')
        document.getElementById('auth-done-btn').onclick = () => finishAuth(providerID, methodIndex)

      } catch (e) {
        authStatus.className = 'error'
        authStatus.textContent = `驗證失敗：${e.message}`
        authStartBtn.disabled = false
      }
    }

    async function finishAuth(providerID, methodIndex) {
      authStatus.className = 'waiting'
      authStatus.textContent = '儲存驗證 token...'
      try {
        // Must call /oauth/callback to: save token to SQLite + stop OAuth server on port 1455
        const res = await fetch(`${API}/provider/${providerID}/oauth/callback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ method: methodIndex }),
        })
        if (!res.ok) {
          const err = await res.text()
          throw new Error(`${res.status}: ${err}`)
        }
        authStatus.className = 'done'
        authStatus.innerHTML = `✓ ${providerID} 驗證成功！Token 已儲存。<br><small style="color:#555">請重啟 Container 後重整頁面，模型才會生效。<br><code>docker compose restart opencode</code></small>`
        authStartBtn.disabled = false
        authToggleBtn.classList.add('success')
        await loadModels()
      } catch (e) {
        authStatus.className = 'error'
        authStatus.textContent = `儲存失敗：${e.message}`
        authStartBtn.disabled = false
      }
    }

    // ── session ───────────────────────────────────────────────

    async function ensureSession() {
      if (sessionId) return
      const res = await fetch(`${API}/session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}',
      })
      if (!res.ok) throw new Error(`Create session failed: ${res.status}`)
      const data = await res.json()
      sessionId = data.id
    }

    function resetSession() {
      sessionId = null
      pendingImages = []
      messagesEl.innerHTML = ''
      previewArea.innerHTML = ''
    }

    // ── image ─────────────────────────────────────────────────

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = e => resolve(e.target.result)
        reader.onerror = reject
        reader.readAsDataURL(file)
      })
    }

    async function addPendingImages(files) {
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue
        const dataUrl = await fileToDataUrl(file)
        pendingImages.push({ mime: file.type, filename: file.name, url: dataUrl })
        const item = document.createElement('div')
        item.className = 'preview-item'
        const img = document.createElement('img')
        img.src = dataUrl
        const removeBtn = document.createElement('button')
        removeBtn.textContent = '×'
        removeBtn.onclick = () => {
          pendingImages.splice(pendingImages.findIndex(p => p.url === dataUrl), 1)
          item.remove()
        }
        item.appendChild(img)
        item.appendChild(removeBtn)
        previewArea.appendChild(item)
      }
    }

    // ── render ────────────────────────────────────────────────

    function appendMessage(role, parts, modelTag) {
      const wrap = document.createElement('div')
      wrap.className = `msg ${role}`

      const roleLabel = document.createElement('div')
      roleLabel.className = 'msg-role'
      roleLabel.textContent = role === 'user' ? 'You' : 'Assistant'
      wrap.appendChild(roleLabel)

      for (const part of parts) {
        if (part.type === 'file' && part.url) {
          const img = document.createElement('img')
          img.src = part.url
          img.className = 'msg-image'
          wrap.appendChild(img)
        } else if (part.type === 'text' && part.text) {
          const bubble = document.createElement('div')
          bubble.className = 'msg-bubble'
          bubble.textContent = part.text
          wrap.appendChild(bubble)
        }
      }

      if (modelTag) {
        const tag = document.createElement('div')
        tag.className = 'msg-model-tag'
        tag.textContent = modelTag
        wrap.appendChild(tag)
      }

      messagesEl.appendChild(wrap)
      messagesEl.scrollTop = messagesEl.scrollHeight
    }

    function appendTyping() {
      const el = document.createElement('div')
      el.className = 'typing'
      el.innerHTML = '<span></span><span></span><span></span>'
      messagesEl.appendChild(el)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return el
    }

    function appendError(msg) {
      const el = document.createElement('div')
      el.className = 'error-msg'
      el.textContent = msg
      messagesEl.appendChild(el)
      messagesEl.scrollTop = messagesEl.scrollHeight
    }

    // ── send ──────────────────────────────────────────────────

    async function send() {
      if (busy) return
      const text = textInput.value.trim()
      if (!text && pendingImages.length === 0) return

      busy = true
      sendBtn.disabled = true

      const model = selectedModel()
      const parts = []
      for (const img of pendingImages) {
        parts.push({ type: 'file', mime: img.mime, filename: img.filename, url: img.url })
      }
      if (text) parts.push({ type: 'text', text })

      appendMessage('user', parts)

      textInput.value = ''
      pendingImages = []
      previewArea.innerHTML = ''
      autoResize()

      const typing = appendTyping()

      try {
        await ensureSession()
        const res = await fetch(`${API}/session/${sessionId}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ parts, model }),
        })
        typing.remove()
        if (!res.ok) {
          appendError(`Error ${res.status}: ${await res.text()}`)
          return
        }
        const data = await res.json()
        const textParts = (data.parts ?? []).filter(p => p.type === 'text' && !p.synthetic)
        if (textParts.length > 0) {
          appendMessage('assistant', textParts, `${model.providerID}/${model.modelID}`)
        } else {
          appendError('No text response received.')
        }
      } catch (e) {
        typing.remove()
        appendError(`Request failed: ${e.message}`)
      } finally {
        busy = false
        sendBtn.disabled = false
        textInput.focus()
      }
    }

    // ── events ────────────────────────────────────────────────

    function autoResize() {
      textInput.style.height = 'auto'
      textInput.style.height = Math.min(textInput.scrollHeight, 120) + 'px'
    }

    sendBtn.addEventListener('click', send)
    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send() }
    })
    textInput.addEventListener('input', autoResize)
    imageBtn.addEventListener('click', () => fileInput.click())
    fileInput.addEventListener('change', async e => {
      await addPendingImages(Array.from(e.target.files))
      fileInput.value = ''
    })
    newBtn.addEventListener('click', resetSession)
    messagesEl.addEventListener('dragover', e => e.preventDefault())
    messagesEl.addEventListener('drop', async e => {
      e.preventDefault()
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'))
      if (files.length > 0) await addPendingImages(files)
    })

    // ── init ──────────────────────────────────────────────────
    loadModels()
  </script>
</body>
</html>
